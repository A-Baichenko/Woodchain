spring.application.name=woodchain

# MySQL nur für Login/User
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/woodchain}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:app}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:app}

# Flyway nur für User-Tabelle
spring.flyway.url=${SPRING_FLYWAY_URL:${spring.datasource.url}}
spring.flyway.user=${SPRING_FLYWAY_USER:${spring.datasource.username}}
spring.flyway.password=${SPRING_FLYWAY_PASSWORD:${spring.datasource.password}}
spring.flyway.locations=classpath:db/migration

# Hibernate prüft nur, ob die User-Tabelle zur Entity passt
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# JWT Demo Secret
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-jwt-secret-key-1234567890-woodchain-secret}

# Hyperledger Fabric
fabric.channel-name=mychannel
fabric.chaincode-name=woodchain
fabric.crypto-path=/home/andre/hyperledger/fabric-samples/test-network/organizations/peerOrganizations/org1.example.com
fabric.peer-endpoint=localhost:7051
fabric.peer-override-auth=peer0.org1.example.com